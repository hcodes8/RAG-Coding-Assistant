<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DevDocs RAG Chatbot</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:          #0d0d0d;
    --surface:     #141414;
    --surface2:    #1a1a1a;
    --border:      #262626;
    --border2:     #303030;
    --accent:      #6366f1;
    --accent-dim:  #4f52d4;
    --accent-glow: rgba(99,102,241,0.15);
    --text-1:      #f5f5f5;
    --text-2:      #a3a3a3;
    --text-3:      #525252;
    --user-bg:     #1e1e2e;
    --bot-bg:      #141414;
    --success:     #22c55e;
    --warn:        #f59e0b;
    --error:       #ef4444;
    --radius:      12px;
    --font-ui:     'Sora', sans-serif;
    --font-mono:   'JetBrains Mono', monospace;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text-1);
    font-family: var(--font-ui);
    font-size: 14px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Layout ── */
  .app {
    display: grid;
    grid-template-columns: 240px 1fr;
    grid-template-rows: 1fr;
    height: 100vh;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 20px 14px;
    gap: 8px;
    overflow-y: auto;
  }

  .sidebar-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px 20px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 8px;
  }

  .logo-icon {
    width: 32px; height: 32px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }

  .logo-text {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-1);
    letter-spacing: -0.2px;
  }

  .sidebar-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-3);
    padding: 0 10px;
    margin-top: 8px;
  }

  .lang-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 10px;
    border-radius: 8px;
    border: none;
    background: transparent;
    color: var(--text-2);
    font-family: var(--font-ui);
    font-size: 13px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    text-align: left;
    width: 100%;
  }

  .lang-btn:hover { background: var(--surface2); color: var(--text-1); }

  .lang-btn.active {
    background: var(--accent-glow);
    color: var(--text-1);
    border: 1px solid rgba(99,102,241,0.3);
  }

  .lang-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--text-3);
    flex-shrink: 0;
    transition: background 0.2s;
  }

  .lang-btn.active .lang-dot { background: var(--accent); }
  .lang-btn.ingested .lang-dot { background: var(--success); }

  .lang-name { flex: 1; }

  .reload-btn {
    margin-top: auto;
    padding: 9px 10px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-2);
    font-family: var(--font-ui);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex; align-items: center; gap: 8px;
  }
  .reload-btn:hover { background: var(--surface2); color: var(--text-1); border-color: var(--border2); }

  /* ── Main ── */
  .main {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  /* ── Header ── */
  .header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--bg);
    flex-shrink: 0;
  }

  .header-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--text-1);
  }

  .status-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 12px;
    border-radius: 999px;
    background: var(--surface);
    border: 1px solid var(--border);
    font-size: 11px;
    color: var(--text-2);
    transition: all 0.3s;
  }

  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text-3);
    transition: background 0.3s;
  }

  .status-pill.ready .status-dot   { background: var(--success); box-shadow: 0 0 6px var(--success); }
  .status-pill.thinking .status-dot { background: var(--warn); animation: pulse 1s infinite; }
  .status-pill.error .status-dot   { background: var(--error); }

  @keyframes pulse {
    0%, 100% { opacity: 1; } 50% { opacity: 0.3; }
  }

  /* ── Chat ── */
  .chat-container {
    flex: 1;
    overflow-y: auto;
    padding: 24px 0;
    scroll-behavior: smooth;
  }

  .chat-container::-webkit-scrollbar { width: 4px; }
  .chat-container::-webkit-scrollbar-track { background: transparent; }
  .chat-container::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 16px;
    color: var(--text-3);
    text-align: center;
    padding: 40px;
  }

  .empty-icon {
    font-size: 40px;
    opacity: 0.4;
  }

  .empty-title {
    font-size: 18px;
    font-weight: 500;
    color: var(--text-2);
  }

  .empty-sub {
    font-size: 13px;
    color: var(--text-3);
    max-width: 320px;
  }

  .suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-top: 8px;
  }

  .suggestion-chip {
    padding: 8px 14px;
    border-radius: 999px;
    border: 1px solid var(--border2);
    background: var(--surface);
    color: var(--text-2);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: var(--font-ui);
  }

  .suggestion-chip:hover {
    border-color: var(--accent);
    color: var(--text-1);
    background: var(--accent-glow);
  }

  /* ── Messages ── */
  .message {
    padding: 20px 24px;
    display: flex;
    gap: 14px;
    animation: fadeSlideIn 0.2s ease;
  }

  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .message.user { background: var(--user-bg); }
  .message.assistant { background: var(--bot-bg); }

  .message-avatar {
    width: 30px; height: 30px;
    border-radius: 8px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    font-weight: 600;
    margin-top: 1px;
  }

  .message.user .message-avatar {
    background: var(--accent);
    color: white;
  }

  .message.assistant .message-avatar {
    background: var(--surface2);
    border: 1px solid var(--border2);
    color: var(--text-1);
    font-size: 13px;
  }

  .message-body { flex: 1; min-width: 0; }

  .message-role {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-bottom: 8px;
    color: var(--text-3);
  }

  .message.user .message-role { color: rgba(99,102,241,0.7); }

  .message-content {
    font-size: 14px;
    line-height: 1.75;
    color: var(--text-1);
    white-space: pre-wrap;
    word-break: break-word;
  }

  /* Code blocks inside messages */
  .message-content code {
    font-family: var(--font-mono);
    font-size: 12.5px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 5px;
    color: #a5b4fc;
  }

  .message-content pre {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    overflow-x: auto;
    margin: 10px 0;
  }

  .message-content pre code {
    background: none;
    border: none;
    padding: 0;
    color: #e2e8f0;
  }

  .sources {
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .source-tag {
    font-size: 10px;
    font-family: var(--font-mono);
    color: var(--text-3);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 7px;
  }

  /* Typing cursor */
  .cursor {
    display: inline-block;
    width: 2px; height: 14px;
    background: var(--accent);
    margin-left: 1px;
    vertical-align: middle;
    animation: blink 0.8s infinite;
  }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  /* ── System message ── */
  .sys-msg {
    text-align: center;
    padding: 8px 24px;
    font-size: 12px;
    color: var(--text-3);
    font-style: italic;
  }

  /* ── Input area ── */
  .input-area {
    padding: 16px 24px 20px;
    background: var(--bg);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .input-wrapper {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    padding: 10px 10px 10px 16px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .input-wrapper:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  #user-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text-1);
    font-family: var(--font-ui);
    font-size: 14px;
    line-height: 1.6;
    resize: none;
    min-height: 24px;
    max-height: 160px;
    overflow-y: auto;
  }

  #user-input::placeholder { color: var(--text-3); }

  #user-input::-webkit-scrollbar { width: 3px; }
  #user-input::-webkit-scrollbar-thumb { background: var(--border2); }

  .send-btn {
    width: 36px; height: 36px;
    border-radius: 8px;
    border: none;
    background: var(--accent);
    color: white;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s, transform 0.1s, opacity 0.2s;
    font-size: 15px;
  }

  .send-btn:hover:not(:disabled) { background: var(--accent-dim); transform: scale(1.05); }
  .send-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

  .input-hint {
    font-size: 11px;
    color: var(--text-3);
    text-align: center;
    margin-top: 8px;
  }

  /* ── Ingesting overlay ── */
  .ingest-overlay {
    position: absolute;
    inset: 0;
    background: rgba(13,13,13,0.85);
    backdrop-filter: blur(4px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    z-index: 10;
    display: none;
  }

  .ingest-overlay.visible { display: flex; }

  .spinner {
    width: 36px; height: 36px;
    border: 2px solid var(--border2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .ingest-text {
    font-size: 14px;
    color: var(--text-2);
  }

  .ingest-sub {
    font-size: 12px;
    color: var(--text-3);
  }

  /* ── Scrollbar ── */
  * { scrollbar-width: thin; scrollbar-color: var(--border2) transparent; }
</style>
</head>
<body>
<div class="app">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">⬡</div>
      <span class="logo-text">DevDocs RAG</span>
    </div>
    <div class="sidebar-label">Languages</div>
    <div id="lang-list">
      <div class="sys-msg">Loading…</div>
    </div>
    <button class="reload-btn" onclick="reloadDocs()" title="Re-ingest current language">
      <span>↺</span> Reload Docs
    </button>
  </aside>

  <!-- Main -->
  <main class="main">

    <!-- Header -->
    <header class="header">
      <span class="header-title" id="header-title">Select a language to begin</span>
      <div class="status-pill" id="status-pill">
        <div class="status-dot"></div>
        <span id="status-text">Initialising</span>
      </div>
    </header>

    <!-- Chat -->
    <div class="chat-container" id="chat">
      <div class="empty-state" id="empty-state">
        <div class="empty-icon">📚</div>
        <div class="empty-title">Ask about your docs</div>
        <div class="empty-sub">Select a language from the sidebar, then ask any question about its documentation.</div>
        <div class="suggestions" id="suggestions">
          <button class="suggestion-chip" onclick="sendSuggestion(this)">What are the basic data types?</button>
          <button class="suggestion-chip" onclick="sendSuggestion(this)">How does error handling work?</button>
          <button class="suggestion-chip" onclick="sendSuggestion(this)">Explain functions and scope</button>
          <button class="suggestion-chip" onclick="sendSuggestion(this)">What are list comprehensions?</button>
        </div>
      </div>
    </div>

    <!-- Ingesting overlay -->
    <div class="ingest-overlay" id="ingest-overlay">
      <div class="spinner"></div>
      <div class="ingest-text" id="ingest-text">Ingesting documentation…</div>
      <div class="ingest-sub">This only happens once per language</div>
    </div>

    <!-- Input -->
    <div class="input-area">
      <div class="input-wrapper">
        <textarea
          id="user-input"
          placeholder="Ask a question about the documentation…"
          rows="1"
          disabled
        ></textarea>
        <button class="send-btn" id="send-btn" onclick="sendMessage()" disabled title="Send (Enter)">
          ↑
        </button>
      </div>
      <div class="input-hint">Enter to send &nbsp;·&nbsp; Shift+Enter for new line</div>
    </div>

  </main>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let activeLanguage = null;
let isStreaming    = false;
let ingestedLangs  = new Set();
setInterval(async () => {
  try { await fetch('/api/ping', { method: 'POST' }); }
  catch {}
}, 4000);
// ── Init ───────────────────────────────────────────────────────────────────
async function init() {
  await loadLanguages();
  const status = await fetch('/api/status').then(r => r.json());
  if (status.language) {
    ingestedLangs.add(status.language);
    setActiveLanguage(status.language, false);
  }
}

async function loadLanguages() {
  const { languages } = await fetch('/api/languages').then(r => r.json());
  const list = document.getElementById('lang-list');
  list.innerHTML = '';
  if (!languages.length) {
    list.innerHTML = '<div class="sys-msg">No docs found</div>';
    return;
  }
  languages.forEach(lang => {
    const btn = document.createElement('button');
    btn.className = 'lang-btn';
    btn.dataset.lang = lang;
    btn.innerHTML = `<span class="lang-dot"></span><span class="lang-name">${capitalize(lang)}</span>`;
    btn.onclick = () => activateLanguage(lang);
    list.appendChild(btn);
  });
}

// ── Language activation ────────────────────────────────────────────────────
async function activateLanguage(language) {
  if (language === activeLanguage && ingestedLangs.has(language)) return;

  const needsIngest = !ingestedLangs.has(language);
  if (needsIngest) {
    showIngestOverlay(`Ingesting ${capitalize(language)} documentation…`);
  }

  setStatus('thinking', `Loading ${language}…`);

  try {
    const res = await fetch('/api/activate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ language }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Activation failed');

    ingestedLangs.add(language);
    setActiveLanguage(language, needsIngest);

    if (needsIngest) {
      addSystemMessage(`✓ Ingested ${(data.chunks || 0).toLocaleString()} chunks for ${capitalize(language)}`);
    } else {
      addSystemMessage(`Switched to ${capitalize(language)} documentation`);
    }
  } catch (err) {
    setStatus('error', 'Error');
    addSystemMessage(`✗ ${err.message}`);
  } finally {
    hideIngestOverlay();
  }
}

function setActiveLanguage(language, _wasIngested) {
  activeLanguage = language;
  document.getElementById('header-title').textContent = `${capitalize(language)} Documentation`;
  setStatus('ready', `${capitalize(language)} ready`);
  enableInput(true);

  // Update sidebar buttons
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.lang === language);
    if (ingestedLangs.has(btn.dataset.lang)) btn.classList.add('ingested');
  });
}

async function reloadDocs() {
  if (!activeLanguage) return;
  ingestedLangs.delete(activeLanguage);
  await activateLanguage(activeLanguage);
}

// ── Messaging ──────────────────────────────────────────────────────────────
let tokenQueue = [];
let renderingTokens = false;
let fullText = '';

async function drainTokenQueue(contentEl, cursorEl) {
  if (renderingTokens) return;
  renderingTokens = true;
  while (tokenQueue.length > 0) {
    const token = tokenQueue.shift();
    fullText += token;
    cursorEl.remove();
    contentEl.innerHTML = renderContent(fullText);
    contentEl.appendChild(cursorEl);
    scrollToBottom();
    await new Promise(r => setTimeout(r, 18));
  }
  renderingTokens = false;
}

async function sendMessage() {
  const input = document.getElementById('user-input');
  const question = input.value.trim();
  if (!question || isStreaming || !activeLanguage) return;

  input.value = '';
  autoResize(input);
  hideEmptyState();

  addMessage('user', question);
  const botMsg = addMessage('assistant', '');
  const contentEl = botMsg.querySelector('.message-content');
  const cursor = document.createElement('span');
  cursor.className = 'cursor';
  contentEl.appendChild(cursor);

  isStreaming = true;
  enableInput(false);
  setStatus('thinking', 'Thinking…');

  try {
    const res = await fetch('/api/ask', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question }),
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { value, done } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop(); // keep incomplete line

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const raw = line.slice(6).trim();
        if (raw === '[DONE]') break;
        try {
            const { token } = JSON.parse(raw);
            tokenQueue.push(token);
            drainTokenQueue(contentEl, cursor);
            } catch {}
      }
    }
  } catch (err) {
    fullText += `\n\nConnection error: ${err.message}`;
  }

  // Finalise
  cursor.remove();
  contentEl.innerHTML = renderContent(fullText);

  // Extract and render sources separately
  const { body, sources } = extractSources(fullText);
  contentEl.innerHTML = renderContent(body);
  if (sources.length) {
    const srcEl = document.createElement('div');
    srcEl.className = 'sources';
    sources.forEach(s => {
      const tag = document.createElement('span');
      tag.className = 'source-tag';
      tag.textContent = s;
      srcEl.appendChild(tag);
    });
    botMsg.querySelector('.message-body').appendChild(srcEl);
  }

  isStreaming = false;
  enableInput(true);
  setStatus('ready', `${capitalize(activeLanguage)} ready`);
  scrollToBottom();
}

function sendSuggestion(btn) {
  if (!activeLanguage) return;
  document.getElementById('user-input').value = btn.textContent;
  sendMessage();
}

// ── Rendering helpers ──────────────────────────────────────────────────────
function renderContent(text) {
  // Escape HTML
  let html = text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');

  // Code blocks
  html = html.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) =>
    `<pre><code>${code.trim()}</code></pre>`
  );

  // Inline code
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

  // Bold
  html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');

  // Newlines
  html = html.replace(/\n/g, '<br>');

  return html;
}

function extractSources(text) {
  const sourcesMatch = text.match(/Sources?:\s*([\s\S]*)$/i);
  if (!sourcesMatch) return { body: text, sources: [] };

  const body = text.slice(0, text.indexOf(sourcesMatch[0])).trim();
  const sourceLines = sourcesMatch[1]
    .split('\n')
    .map(l => l.replace(/^[-*\s\[\]]+/, '').replace(/\]$/, '').trim())
    .filter(Boolean);

  return { body, sources: sourceLines };
}

// ── DOM helpers ────────────────────────────────────────────────────────────
function addMessage(role, text) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = `message ${role}`;
  div.innerHTML = `
    <div class="message-avatar">${role === 'user' ? 'U' : '⬡'}</div>
    <div class="message-body">
      <div class="message-role">${role === 'user' ? 'You' : 'Assistant'}</div>
      <div class="message-content">${renderContent(text)}</div>
    </div>
  `;
  chat.appendChild(div);
  scrollToBottom();
  return div;
}

function addSystemMessage(text) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'sys-msg';
  div.textContent = text;
  chat.appendChild(div);
}

function hideEmptyState() {
  const e = document.getElementById('empty-state');
  if (e) e.remove();
}

function scrollToBottom() {
  const chat = document.getElementById('chat');
  chat.scrollTop = chat.scrollHeight;
}

function setStatus(state, text) {
  const pill = document.getElementById('status-pill');
  const label = document.getElementById('status-text');
  pill.className = `status-pill ${state}`;
  label.textContent = text;
}

function enableInput(enabled) {
  document.getElementById('user-input').disabled = !enabled;
  document.getElementById('send-btn').disabled = !enabled;
}

function showIngestOverlay(text) {
  document.getElementById('ingest-text').textContent = text;
  document.getElementById('ingest-overlay').classList.add('visible');
}

function hideIngestOverlay() {
  document.getElementById('ingest-overlay').classList.remove('visible');
}

function capitalize(s) {
  return s ? s.charAt(0).toUpperCase() + s.slice(1) : s;
}

// ── Textarea auto-resize ───────────────────────────────────────────────────
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 160) + 'px';
}

document.getElementById('user-input').addEventListener('input', function() {
  autoResize(this);
});

document.getElementById('user-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

// ── Boot ───────────────────────────────────────────────────────────────────
init();
</script>
